<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glider Flight Project HUD Simulator</title>

    <!-- Correct CSS path -->
    css/style.css

    <!-- Three.js (proper script tag) -->
    <ttps://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js

    <!-- File loader -->
    <script src="jss</script>

    <!-- Main app code -->
    <script src="js/app.js" defer></script>
</head>

<body>

    <header>
        <h1>Glider Flight Project HUD Simulator</h1>
    </header>

    <main>

        <!-- Upload Section -->
        <section id="upload-section">
            <h2>Upload Your Flight JSON</h2>
            <input type="file" id="fileInput" accept=".json">
            <label for="fileInput" id="uploadLabel">Choose File</label>
        </section>

        <!-- HUD Elements -->
        <section id="hud-elements">
            <div class="hud-element" id="hud-alt">Altitude: --- ft</div>
            <div class="hud-element" id="hud-g">G-Load: --- G</div>
            <div class="hud-element" id="hud-gs">GS: --- mph</div>
            <div class="hud-element" id="hud-roll">Roll: ---°</div>
            <div class="hud-element" id="hud-pitch">Pitch: ---°</div>
            <div class="hud-element" id="hud-head">Heading: ---°</div>
        </section>

        <!-- Three.js canvas container -->
        <div id="canvas-container"></div>

        <!-- Mini Attitude Indicator -->
        <div id="attitude-indicator">
            <div id="bank-pointer"></div>
            <div id="ai-wings"></div>

            <div class="pitch-line" style="top:20%;">+20°</div>
            <div class="pitch-line" style="top:30%;">+10°</div>
            <div class="pitch-line" style="top:50%;">0°</div>
            <div class="pitch-line" style="top:70%;">-10°</div>
            <div class="pitch-line" style="top:80%;">-20°</div>
        </div>

        <!-- Playback Controls -->
        <section id="timeline-controls">
            <h2>Timeline Controls</h2>
            <button id="btnPlay">Play</button>
            <button id="btnPause">Pause</button>
            <input type="range" id="slider" min="0" max="1" value="0">
            <span id="timeDisplay">00:00.00</span>
        </section>

    </main>

</body>
</html>
